<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        dark: '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card {
                @apply bg-white rounded-lg shadow-md p-6 transition-all duration-300 hover:shadow-lg;
            }
            .btn {
                @apply px-4 py-2 rounded-md font-medium transition-all duration-300;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90;
            }
            .btn-warning {
                @apply bg-warning text-white hover:bg-warning/90;
            }
            .input-field {
                @apply w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50;
            }
            .textarea-field {
                @apply w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary/50 resize-none;
            }
            .alert {
                @apply p-4 rounded-md mb-4;
            }
            .alert-success {
                @apply bg-green-100 text-green-700;
            }
            .alert-error {
                @apply bg-red-100 text-red-700;
            }
            .alert-info {
                @apply bg-blue-100 text-blue-700;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-database text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-dark">知识库管理系统</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="refresh-btn" class="btn btn-secondary flex items-center space-x-1">
                    <i class="fa fa-refresh"></i>
                    <span>刷新</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="container mx-auto px-4 py-6">
        <!-- 状态卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- 数据库状态 -->
            <div class="card">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-dark">数据库状态</h2>
                    <i class="fa fa-database text-primary text-xl"></i>
                </div>
                <div id="database-status" class="text-gray-600">
                    <p>加载中...</p>
                </div>
                <div class="mt-4 flex space-x-2">
                    <button id="create-db-btn" class="btn btn-primary flex-1">
                        <i class="fa fa-plus mr-1"></i> 创建
                    </button>
                    <button id="delete-db-btn" class="btn btn-danger flex-1">
                        <i class="fa fa-trash mr-1"></i> 删除
                    </button>
                </div>
            </div>

            <!-- 知识库状态 -->
            <div class="card">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-dark">知识库状态</h2>
                    <i class="fa fa-book text-secondary text-xl"></i>
                </div>
                <div id="knowledge-base-status" class="text-gray-600">
                    <p>加载中...</p>
                </div>
                <div class="mt-4 flex space-x-2">
                    <button id="create-kb-btn" class="btn btn-secondary flex-1">
                        <i class="fa fa-plus mr-1"></i> 创建
                    </button>
                    <button id="delete-kb-btn" class="btn btn-danger flex-1">
                        <i class="fa fa-trash mr-1"></i> 删除
                    </button>
                </div>
            </div>

            <!-- 文档统计 -->
            <div class="card">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-dark">文档统计</h2>
                    <i class="fa fa-file-text text-warning text-xl"></i>
                </div>
                <div id="document-stats" class="text-gray-600">
                    <p>加载中...</p>
                </div>
                <div class="mt-4">
                    <button id="add-docs-btn" class="btn btn-warning w-full">
                        <i class="fa fa-plus mr-1"></i> 添加文档
                    </button>
                </div>
            </div>
        </div>

        <!-- 数据库列表 -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold text-dark mb-4">数据库列表</h2>
            <div id="database-list" class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead>
                        <tr>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                数据库名称
                            </th>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                状态
                            </th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="2" class="px-6 py-4 text-center text-gray-500">
                                加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 集合列表 -->
        <div class="card mb-8">
            <h2 class="text-lg font-semibold text-dark mb-4">集合列表</h2>
            <div id="collection-list" class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead>
                        <tr>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                集合名称
                            </th>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                操作
                            </th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="2" class="px-6 py-4 text-center text-gray-500">
                                加载中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 操作日志 -->
        <div class="card">
            <h2 class="text-lg font-semibold text-dark mb-4">操作日志</h2>
            <div id="operation-log" class="max-h-60 overflow-y-auto bg-gray-50 p-4 rounded-md">
                <p class="text-gray-500">操作日志将显示在这里...</p>
            </div>
        </div>
    </main>

    <!-- 添加文档模态框 -->
    <div id="add-docs-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="text-lg font-semibold text-dark">添加文档</h2>
                <button id="close-modal-btn" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <div id="document-forms" class="space-y-4">
                    <!-- 文档表单将动态添加 -->
                    <div class="document-form">
                        <h3 class="font-medium text-dark mb-2">文档 1</h3>
                        <div class="space-y-2">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">问题</label>
                                <input type="text" class="input-field" name="question" placeholder="请输入问题">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">回答</label>
                                <textarea class="textarea-field" rows="3" name="answer" placeholder="请输入回答"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                                <input type="text" class="input-field" name="category" placeholder="请输入分类">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-4 flex justify-between">
                    <button id="add-form-btn" class="btn btn-secondary">
                        <i class="fa fa-plus mr-1"></i> 添加文档
                    </button>
                    <button id="remove-form-btn" class="btn btn-danger">
                        <i class="fa fa-minus mr-1"></i> 移除文档
                    </button>
                </div>
            </div>
            <div class="p-4 border-t flex justify-end space-x-2">
                <button id="cancel-add-docs-btn" class="btn bg-gray-200 text-gray-700 hover:bg-gray-300">
                    取消
                </button>
                <button id="submit-docs-btn" class="btn btn-primary">
                    提交
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
